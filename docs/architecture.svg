<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="flow" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>

  <!-- title -->
  <text x="36" y="44" font-size="26" font-weight="700" fill="#0f172a">The Consumer VC Analyst Playbook · Data &amp; Architecture</text>
  <text x="36" y="70" font-size="14" fill="#64748b">Public sources to daily ingest to one typed data layer to compute to eight applets. Static, no backend; every figure traces to a source.</text>

  <!-- flow arrows + labels (in the gaps between columns) -->
  <g>
    <text x="313" y="452" font-size="10" fill="#94a3b8" text-anchor="middle">ingest</text>
    <line x1="300" y1="466" x2="324" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow)"/>
    <text x="579" y="452" font-size="10" fill="#94a3b8" text-anchor="middle">store</text>
    <line x1="566" y1="466" x2="590" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow)"/>
    <text x="935" y="452" font-size="10" fill="#94a3b8" text-anchor="middle">compute</text>
    <line x1="922" y1="466" x2="946" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow)"/>
    <text x="1181" y="452" font-size="10" fill="#94a3b8" text-anchor="middle">render</text>
    <line x1="1168" y1="466" x2="1192" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow)"/>
  </g>

  <!-- ================= COLUMN A: SOURCES ================= -->
  <rect x="30" y="100" width="270" height="720" rx="12" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
  <text x="44" y="124" font-size="13" font-weight="700" fill="#475569">DATA SOURCES</text>
  <line x1="44" y1="134" x2="286" y2="134" stroke="#e2e8f0" stroke-width="1"/>
  <text x="44" y="160" font-size="11.5" font-weight="700" fill="#334155">Funding press</text>
  <text x="50" y="182" font-size="11" fill="#475569">Inc42</text>
  <text x="50" y="204" font-size="11" fill="#475569">Entrackr</text>
  <text x="50" y="226" font-size="11" fill="#475569">YourStory</text>
  <text x="50" y="248" font-size="11" fill="#475569">Business Standard</text>
  <text x="50" y="270" font-size="11" fill="#475569">Moneycontrol · Tracxn</text>
  <text x="44" y="304" font-size="11.5" font-weight="700" fill="#334155">Industry reports (parsed PDFs)</text>
  <text x="50" y="326" font-size="11" fill="#475569">Bain India VC 2025 / 2026</text>
  <text x="50" y="348" font-size="11" fill="#475569">Redseer · Fireside</text>
  <text x="50" y="370" font-size="11" fill="#475569">McKinsey · BCG · PwC</text>
  <text x="44" y="404" font-size="11.5" font-weight="700" fill="#334155">Public signals</text>
  <text x="50" y="426" font-size="11" fill="#475569">LinkedIn headcount</text>
  <text x="50" y="448" font-size="11" fill="#475569">Google Trends (est.)</text>
  <text x="50" y="470" font-size="11" fill="#475569">Meta Ads Library (est.)</text>
  <text x="44" y="792" font-size="9.5" font-style="italic" fill="#94a3b8">Every datum carries a source URL.</text>

  <!-- ================= COLUMN B: INGEST ================= -->
  <rect x="326" y="100" width="240" height="720" rx="12" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="124" font-size="13" font-weight="700" fill="#059669">INGEST &amp; VALIDATION</text>
  <line x1="340" y1="134" x2="552" y2="134" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="160" font-size="11.5" font-weight="700" fill="#065f46">Automated · daily</text>
  <text x="346" y="182" font-size="11" fill="#475569">GitHub Actions cron (09:00 IST)</text>
  <text x="346" y="204" font-size="11" fill="#475569">daily-update.mjs</text>
  <text x="346" y="226" font-size="11" fill="#475569">Claude API + web search</text>
  <text x="346" y="248" font-size="11" fill="#475569">validate · dedupe · source-check</text>
  <text x="346" y="270" font-size="11" fill="#475569">→ auto-rounds.json</text>
  <text x="340" y="304" font-size="11.5" font-weight="700" fill="#065f46">Manual curation</text>
  <text x="346" y="326" font-size="11" fill="#475569">rounds · brands · investors</text>
  <text x="346" y="348" font-size="11" fill="#475569">report PDFs → figures (cited)</text>
  <text x="340" y="382" font-size="11.5" font-weight="700" fill="#065f46">Integrity rules</text>
  <text x="346" y="404" font-size="11" fill="#475569">modeled vs sourced labeled</text>
  <text x="346" y="426" font-size="11" fill="#475569">estimated signals tagged "est."</text>
  <text x="346" y="448" font-size="11" fill="#475569">"data as of" timestamps</text>

  <!-- ================= COLUMN C: DATA LAYER ================= -->
  <rect x="592" y="100" width="330" height="720" rx="12" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="606" y="124" font-size="13" font-weight="700" fill="#4f46e5">DATA LAYER · /lib/data (typed)</text>
  <line x1="606" y1="134" x2="908" y2="134" stroke="#e2e8f0" stroke-width="1"/>
  <text x="606" y="160" font-size="11.5" font-weight="700" fill="#3730a3">MECE spine</text>
  <text x="612" y="182" font-size="11" fill="#475569">taxonomy.ts</text>
  <text x="612" y="199" font-size="9.5" fill="#94a3b8">11 sectors × 6 GTM tags × 5 income tiers</text>
  <text x="606" y="228" font-size="11.5" font-weight="700" fill="#3730a3">Entities</text>
  <text x="612" y="250" font-size="11" fill="#475569">funding-rounds.ts (86) + auto-rounds.json</text>
  <text x="612" y="272" font-size="11" fill="#475569">brands.ts (73)</text>
  <text x="612" y="294" font-size="11" fill="#475569">investors.ts (74)</text>
  <text x="612" y="316" font-size="11" fill="#475569">acquisitions.ts (22)</text>
  <text x="606" y="348" font-size="11.5" font-weight="700" fill="#3730a3">Analysis inputs</text>
  <text x="612" y="370" font-size="11" fill="#475569">cohorts.ts (graduation base rates)</text>
  <text x="612" y="392" font-size="11" fill="#475569">reports.ts · market-context.ts</text>
  <text x="612" y="414" font-size="11" fill="#475569">whitespace.ts (derived from rounds)</text>
  <text x="612" y="436" font-size="11" fill="#475569">unit-economics-defaults.ts</text>
  <text x="606" y="468" font-size="11.5" font-weight="700" fill="#3730a3">Registry</text>
  <text x="612" y="490" font-size="11" fill="#475569">sources.ts · site-meta.json (countdown)</text>

  <!-- ================= COLUMN D: COMPUTE ================= -->
  <rect x="948" y="100" width="220" height="720" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="962" y="124" font-size="13" font-weight="700" fill="#7c3aed">COMPUTE · /lib/utils</text>
  <line x1="962" y1="134" x2="1154" y2="134" stroke="#e2e8f0" stroke-width="1"/>
  <text x="962" y="162" font-size="11.5" font-weight="700" fill="#5b21b6">momentum-score.ts</text>
  <text x="968" y="180" font-size="9.5" fill="#94a3b8">4 computed signals + 2 est.</text>
  <text x="962" y="214" font-size="11.5" font-weight="700" fill="#5b21b6">funding-analytics.ts</text>
  <text x="968" y="232" font-size="9.5" fill="#94a3b8">sector/year mix · cadence · base rates</text>
  <text x="962" y="266" font-size="11.5" font-weight="700" fill="#5b21b6">investor-affinity.ts</text>
  <text x="968" y="284" font-size="9.5" fill="#94a3b8">co-investment overlap + centrality</text>
  <text x="962" y="318" font-size="11.5" font-weight="700" fill="#5b21b6">unit-economics.ts</text>
  <text x="968" y="336" font-size="9.5" fill="#94a3b8">LTV/CAC · payback · verdict</text>

  <!-- ================= COLUMN E: APPLETS ================= -->
  <rect x="1194" y="100" width="376" height="720" rx="12" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="1208" y="124" font-size="13" font-weight="700" fill="#0f172a">APPLETS · 8 routes (Next.js App Router)</text>
  <line x1="1208" y1="134" x2="1556" y2="134" stroke="#e2e8f0" stroke-width="1"/>

  <g>
    <text x="1208" y="162" font-size="12.5" font-weight="700" fill="#0f172a">Funding Explorer</text>
    <text x="1208" y="178" font-size="9.5" fill="#64748b">funding-rounds → funding-analytics (live read, cadence)</text>
    <text x="1208" y="206" font-size="12.5" font-weight="700" fill="#0f172a">Momentum Dashboard</text>
    <text x="1208" y="222" font-size="9.5" fill="#64748b">brands + investors → momentum-score (re-weightable)</text>
    <text x="1208" y="250" font-size="12.5" font-weight="700" fill="#0f172a">White-space Map</text>
    <text x="1208" y="266" font-size="9.5" fill="#64748b">whitespace + market-context (gap grid)</text>
    <text x="1208" y="294" font-size="12.5" font-weight="700" fill="#0f172a">Investor Map</text>
    <text x="1208" y="310" font-size="9.5" fill="#64748b">investors → investor-affinity (syndicate bands)</text>
    <text x="1208" y="338" font-size="12.5" font-weight="700" fill="#0f172a">Graduation Funnel</text>
    <text x="1208" y="354" font-size="9.5" fill="#64748b">cohorts → funding-analytics (base-rates panel)</text>
    <text x="1208" y="382" font-size="12.5" font-weight="700" fill="#0f172a">Unit Economics Sandbox</text>
    <text x="1208" y="398" font-size="9.5" fill="#64748b">defaults → unit-economics (live LTV/CAC)</text>
    <text x="1208" y="426" font-size="12.5" font-weight="700" fill="#0f172a">Exits &amp; Acquisitions</text>
    <text x="1208" y="442" font-size="9.5" fill="#64748b">acquisitions (FMCG M&amp;A leaderboard)</text>
    <text x="1208" y="470" font-size="12.5" font-weight="700" fill="#0f172a">Research &amp; Reports</text>
    <text x="1208" y="486" font-size="9.5" fill="#64748b">reports + market-context (parsed figures)</text>
  </g>
  <text x="1208" y="520" font-size="9.5" font-style="italic" fill="#94a3b8">Each applet leads with a measured "The read" investor takeaway.</text>

  <!-- ================= FOOTER: PLATFORM ================= -->
  <rect x="30" y="838" width="1540" height="44" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="800" y="865" font-size="12.5" fill="#334155" text-anchor="middle">Next.js 14 App Router  ·  TypeScript (strict)  ·  Tailwind · Recharts · Framer Motion  ·  Vercel (git push &#8594; auto-deploy)  ·  Web Analytics  ·  daily 09:00 IST refresh + live countdown</text>
</svg>
