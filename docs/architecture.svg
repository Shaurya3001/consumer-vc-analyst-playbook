<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 940" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1040" height="940" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="38" font-size="22" font-weight="700" fill="#0f172a">The Consumer VC Analyst Playbook · Architecture</text>
  <text x="40" y="58" font-size="13" fill="#64748b">Hub-and-spoke: one typed data layer feeding eight applet routes. Static, no backend.</text>

  <!-- daily pipeline (top) -->
  <g>
    <rect x="130" y="74" width="210" height="44" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.2"/>
    <text x="235" y="101" font-size="12" fill="#065f46" text-anchor="middle">GitHub Actions cron (09:00 IST)</text>

    <rect x="370" y="74" width="150" height="44" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.2"/>
    <text x="445" y="101" font-size="12" fill="#065f46" text-anchor="middle">daily-update.mjs</text>

    <rect x="550" y="74" width="230" height="44" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.2"/>
    <text x="665" y="101" font-size="12" fill="#065f46" text-anchor="middle">Claude API + web search</text>

    <line x1="340" y1="96" x2="366" y2="96" stroke="#059669" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="520" y1="96" x2="546" y2="96" stroke="#059669" stroke-width="1.4" marker-end="url(#arrow)"/>

    <!-- pipeline writes back into the data hub -->
    <line x1="520" y1="118" x2="520" y2="451" stroke="#4f46e5" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
    <text x="534" y="300" font-size="11" font-style="italic" fill="#475569">writes auto-rounds.json</text>
    <text x="534" y="316" font-size="11" font-style="italic" fill="#475569">+ site-meta.json (daily)</text>
  </g>

  <!-- spokes (drawn before nodes) -->
  <g stroke="#cbd5e1" stroke-width="1.5">
    <line x1="520" y1="510" x2="635" y2="233"/>
    <line x1="520" y1="510" x2="797" y2="395"/>
    <line x1="520" y1="510" x2="797" y2="625"/>
    <line x1="520" y1="510" x2="635" y2="787"/>
    <line x1="520" y1="510" x2="405" y2="787"/>
    <line x1="520" y1="510" x2="243" y2="625"/>
    <line x1="520" y1="510" x2="243" y2="395"/>
    <line x1="520" y1="510" x2="405" y2="233"/>
  </g>

  <!-- hub: data layer -->
  <rect x="400" y="455" width="240" height="110" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="520" y="495" font-size="17" font-weight="700" fill="#1e1b4b" text-anchor="middle">lib/data/</text>
  <text x="520" y="516" font-size="12" fill="#3730a3" text-anchor="middle">typed source of truth</text>
  <text x="520" y="537" font-size="11" fill="#475569" text-anchor="middle">86 rounds · 74 investors · brands · reports</text>
  <text x="520" y="556" font-size="10.5" fill="#4f46e5" text-anchor="middle">+ lib/utils compute layer</text>

  <!-- applet nodes -->
  <g>
    <!-- Momentum -->
    <rect x="321" y="207" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="405" y="231" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Momentum Dashboard</text>
    <text x="405" y="248" font-size="9.5" fill="#64748b" text-anchor="middle">rank emerging brands</text>
    <!-- Funding -->
    <rect x="551" y="207" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="635" y="231" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Funding Explorer</text>
    <text x="635" y="248" font-size="9.5" fill="#64748b" text-anchor="middle">where capital concentrates</text>
    <!-- White-space -->
    <rect x="713" y="369" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="797" y="393" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">White-space Map</text>
    <text x="797" y="410" font-size="9.5" fill="#64748b" text-anchor="middle">find category gaps</text>
    <!-- Investor -->
    <rect x="713" y="599" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="797" y="623" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Investor Map</text>
    <text x="797" y="640" font-size="9.5" fill="#64748b" text-anchor="middle">co-investment syndicates</text>
    <!-- Unit Economics -->
    <rect x="551" y="761" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="635" y="785" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Unit Economics</text>
    <text x="635" y="802" font-size="9.5" fill="#64748b" text-anchor="middle">LTV/CAC sandbox</text>
    <!-- Graduation -->
    <rect x="321" y="761" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="405" y="785" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Graduation Funnel</text>
    <text x="405" y="802" font-size="9.5" fill="#64748b" text-anchor="middle">stage base rates</text>
    <!-- Exits -->
    <rect x="159" y="599" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="243" y="623" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Exits Tracker</text>
    <text x="243" y="640" font-size="9.5" fill="#64748b" text-anchor="middle">FMCG M&amp;A</text>
    <!-- Research -->
    <rect x="159" y="369" width="168" height="52" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.2"/>
    <text x="243" y="393" font-size="12.5" font-weight="600" fill="#0f172a" text-anchor="middle">Research &amp; Reports</text>
    <text x="243" y="410" font-size="9.5" fill="#64748b" text-anchor="middle">Bain · Redseer · Fireside</text>
  </g>

  <!-- platform footer -->
  <rect x="140" y="862" width="760" height="46" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="520" y="890" font-size="12.5" fill="#334155" text-anchor="middle">Next.js 14 App Router    ·    Vercel (git push &#8594; auto-deploy)    ·    Vercel Web Analytics</text>
</svg>
